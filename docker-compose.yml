services:

  postgres:
    image: postgres:16
    container_name: cinema-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: cinema-redis
    ports:
      - "6379:6379"


volumes:
  postgres_data: